# SonarCloud project configuration
# https://sonarcloud.io/project/configuration

sonar.organization=shrec
sonar.projectKey=shrec_UltrafastSecp256k1
sonar.projectName=UltrafastSecp256k1

# Source layout
sonar.sources=cpu/src,cpu/include,include,cuda/src,cuda/include
sonar.tests=cpu/tests
sonar.sourceEncoding=UTF-8

# C/C++ settings
sonar.cfamily.threads=4

# Exclusions (generated, third-party, build artifacts)
sonar.exclusions=\
  build/**,\
  build-*/**,\
  cmake-build-*/**,\
  bindings/**,\
  _research_repos/**,\
  DBFiles/**,\
  GenTools/**

# Coverage / test exclusions
# CUDA (.cu/.cuh) requires a GPU -- uninstrumentable on CPU-only CI runners.
# Platform-specific runtime dispatch files (field_asm*, field_simd*) contain
# #ifdef branches for MSVC/GCC/Clang and x86/ARM64 that can never all execute
# on a single CI platform. Assembly (.S) files are not instrumentable.
# field_asm52_arm64.cpp is ARM64-only intrinsics, dead code on x86 CI.
sonar.coverage.exclusions=\
  cpu/tests/**,\
  cpu/bench/**,\
  cuda/**,\
  audit/**,\
  include/ufsecp/**,\
  **/benchmark*.hpp,\
  **/benchmark*.cpp,\
  **/field_4x64*.hpp,\
  **/field_asm*.cpp,\
  **/field_asm*.S,\
  **/field_simd*.cpp,\
  **/field_simd*.hpp,\
  **/private_key.hpp

# Duplicate detection
# Crypto library has intentional structural duplication between fast (variable-
# time) and constant-time (CT) variants (e.g. schnorr.cpp vs ct_sign.cpp).
# Raise threshold to avoid false positives on these architectural mirrors.
sonar.cpd.minimumTokens=120

# Exclude constant-time (CT) variant files from copy-paste detection.
# CT code intentionally mirrors the variable-time implementation line-for-line
# to guarantee identical control flow (branchless, no timing side-channels).
# This structural duplication is an architectural requirement, not copy-paste.
#
# Also exclude cryptographic algorithm implementations (ECDSA/Schnorr) which share
# intentional structural patterns: k*G calculation, nonce derivation, signature
# encoding, BIP-340 tagged hash construction. These are not copy-paste but parallel
# implementations of similar cryptographic protocols per RFC-6979 and BIP-340 specs.
#
# Batch optimization routines (batch_add_affine, batch_normalize) have loop-unrolling
# and SIMD-friendly access patterns that appear as duplication but are deliberate
# for performance (cache-line alignment, prefetch hints, minimize branches).
#
# point.cpp contains dual platform paths (4x64 and 5x52 field representations)
# implementing identical algorithms for different CPU architectures. This structural
# duplication is an architectural requirement for platform dispatch, not copy-paste.
sonar.cpd.exclusions=\
  **/ct_*.cpp,\
  **/field_52*.cpp,\
  **/field_52*.hpp,\
  **/field_4x64*.hpp,\
  **/*ecdsa*.cpp,\
  **/*ecdsa*.hpp,\
  **/*schnorr*.cpp,\
  **/batch_*.cpp,\
  **/point.cpp

# ---------------------------------------------------------------------------
# False-positive suppression for cryptographic code patterns
# ---------------------------------------------------------------------------
# cpp:S876 (MISRA unary minus on unsigned) -- intentional in CT masking:
#   -static_cast<uint64_t>(cond) produces 0x0 or 0xFFFFFFFFFFFFFFFF.
#   This is the fundamental branchless selection idiom in constant-time code.
#   Well-defined behavior: unsigned negation wraps per C++ standard [conv.integral].
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S876
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*

# cpp:S3519 (buffer overflow via symbolic execution) -- false positives where
#   SonarCloud cannot track loop-invariant bounds through cross-function analysis:
#   - SHA-256 finalize() padding: buf_len_ in [0,63] guaranteed by update().
#   - point.cpp batch-inverse prods[]: size kMaxGlvTableSize=32 with explicit
#     guard (glv_table_size <= kMaxGlvTableSize) before any array access.
sonar.issue.ignore.multicriteria.e2.ruleKey=cpp:S3519
sonar.issue.ignore.multicriteria.e2.resourceKey=**/sha256.hpp
sonar.issue.ignore.multicriteria.e3.ruleKey=cpp:S3519
sonar.issue.ignore.multicriteria.e3.resourceKey=**/point.cpp
