# ============================================================================
# CT-Verif -- Compile-Time Constant-Time Verification
# ============================================================================
# Uses the ct-verif LLVM pass (Borrello et al., CCS 2021) to check that
# secret-dependent branches/loads are absent in compiled CT code.
#
# This is DETERMINISTIC (unlike dudect which is statistical) -- if it passes,
# the compiled code is provably constant-time for the analyzed functions.
#
# Repo: https://github.com/imdea-software/verifying-constant-time
# ============================================================================
name: CT-Verif (compile-time CT check)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ct-verif:
    name: ct-verif LLVM analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 llvm-17 llvm-17-dev lld-17 ninja-build \
            python3 python3-pip cmake

      - name: Build ct-verif tool (best-effort)
        run: |
          CT_VERIF_BUILT=false
          git clone --depth 1 https://github.com/imdea-software/verifying-constant-time.git /tmp/ct-verif

          # The upstream repo structure varies -- find CMakeLists.txt
          CTVERIF_SRC=""
          if [ -f /tmp/ct-verif/CMakeLists.txt ]; then
            CTVERIF_SRC=/tmp/ct-verif
          elif [ -f /tmp/ct-verif/src/CMakeLists.txt ]; then
            CTVERIF_SRC=/tmp/ct-verif/src
          elif [ -f /tmp/ct-verif/pass/CMakeLists.txt ]; then
            CTVERIF_SRC=/tmp/ct-verif/pass
          fi

          if [ -n "$CTVERIF_SRC" ]; then
            mkdir -p /tmp/ct-verif-build && cd /tmp/ct-verif-build
            if cmake "$CTVERIF_SRC" -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DLLVM_DIR=/usr/lib/llvm-17/cmake \
                -DCMAKE_C_COMPILER=clang-17 \
                -DCMAKE_CXX_COMPILER=clang++-17 && \
               cmake --build . -j$(nproc); then
              CT_VERIF_BUILT=true
              echo "CT_VERIF_LIB=$(pwd)/lib" >> $GITHUB_ENV
            fi
          fi

          if [ "$CT_VERIF_BUILT" = "true" ]; then
            echo "CT_VERIF_AVAILABLE=true" >> $GITHUB_ENV
            echo "[OK] ct-verif LLVM pass built successfully"
          else
            echo "CT_VERIF_AVAILABLE=false" >> $GITHUB_ENV
            echo "::warning::ct-verif tool build failed -- using manual IR analysis (still blocking on violations)"
            echo "Contents of /tmp/ct-verif:"
            ls -la /tmp/ct-verif/ 2>/dev/null || true
            find /tmp/ct-verif -name 'CMakeLists.txt' -maxdepth 3 2>/dev/null || true
          fi

      - name: Emit LLVM IR for CT modules
        run: |
          # Compile CT-critical source files to LLVM IR for analysis
          CXXFLAGS="-std=c++20 -O2 -emit-llvm -S -fno-exceptions -fno-rtti"
          INCLUDES="-I cpu/include -I cpu/include/secp256k1 -I cpu"

          mkdir -p ct-ir

          # Core CT modules -- these MUST be constant-time
          CT_SOURCES=(
            "cpu/src/ct_field.cpp"
            "cpu/src/ct_scalar.cpp"
            "cpu/src/ct_sign.cpp"
          )

          for src in "${CT_SOURCES[@]}"; do
            base=$(basename "$src" .cpp)
            echo "Compiling $src -> ct-ir/${base}.ll"
            clang++-17 $CXXFLAGS $INCLUDES \
              -o "ct-ir/${base}.ll" "$src" 2>&1 || {
              echo "::error::Failed to compile $src to LLVM IR"
              exit 1
            }
          done

          echo "=== Generated IR files ==="
          ls -lh ct-ir/

      - name: Run ct-verif analysis (full LLVM pass)
        if: env.CT_VERIF_AVAILABLE == 'true'
        run: |
          echo "=== ct-verif deterministic CT analysis ==="
          PASS_RESULT=0

          for ll in ct-ir/*.ll; do
            base=$(basename "$ll" .ll)
            echo ""
            echo "--- Analyzing: $base ---"
            opt-17 -load-pass-plugin="${CT_VERIF_LIB}/libCTVerif.so" \
                   -passes=ct-verif \
                   "$ll" -o /dev/null 2>&1 | tee "ct-ir/${base}_report.txt" || {
              echo "::error::ct-verif reported CT violation in $base"
              PASS_RESULT=1
            }
          done

          if [ "$PASS_RESULT" -eq 0 ]; then
            echo ""
            echo "=== ct-verif: ALL CT modules verified constant-time ==="
          else
            echo ""
            echo "::error::ct-verif found CT violations -- blocking merge"
          fi
          exit $PASS_RESULT

      - name: Run manual IR CT analysis (fallback -- still blocking)
        if: env.CT_VERIF_AVAILABLE != 'true'
        run: |
          echo "=== Manual IR analysis (ct-verif tool unavailable) ==="
          echo "Checking for secret-dependent branches/loads in CT code..."
          echo ""

          VIOLATIONS=0
          for ll in ct-ir/*.ll; do
            base=$(basename "$ll" .ll)
            echo "--- $base ---"

            # Count conditional branches -- high count in CT code is suspicious
            BR_COUNT=$(grep -c "^  br i1" "$ll" 2>/dev/null || echo "0")
            SELECT_COUNT=$(grep -c "select i1" "$ll" 2>/dev/null || echo "0")
            echo "  Conditional branches: $BR_COUNT"
            echo "  Select (branchless):  $SELECT_COUNT"

            # Check for known non-CT patterns -- these are BLOCKING violations
            if grep -q "switch.*label" "$ll" 2>/dev/null; then
              echo "  [FAIL] Found switch statement -- CT violation"
              echo "::error::CT violation in $base: switch statement (secret-dependent branch)"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi

            if grep -q "variable_gep" "$ll" 2>/dev/null; then
              echo "  [FAIL] Found variable GEP -- secret-dependent memory access"
              echo "::error::CT violation in $base: variable GEP (secret-dependent load)"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi

            # Check for indirect calls (potential secret-dependent dispatch)
            INDIRECT=$(grep -c "call.*%[0-9]" "$ll" 2>/dev/null || echo "0")
            if [ "$INDIRECT" -gt 0 ]; then
              echo "  [WARN] Found $INDIRECT indirect call(s) -- review for CT safety"
            fi
          done

          echo ""
          if [ "$VIOLATIONS" -eq 0 ]; then
            echo "=== Manual IR analysis: No CT violations found (fallback -- blocking) ==="
          else
            echo "::error::Found $VIOLATIONS CT violation(s) in IR -- blocking merge"
            exit 1
          fi

      - name: Upload IR reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ct-verif-reports
          path: ct-ir/
          retention-days: 30
