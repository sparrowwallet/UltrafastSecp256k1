# ============================================================================
# Benchmark Dashboard -- Performance Tracking CI
# ============================================================================
# Runs benchmarks on every push to dev/main and stores results.
# Uses github-action-benchmark to track performance regressions.
#
# Results published to GitHub Pages (gh-pages branch).
# Alert threshold: 120% (warns if >20% slower than baseline).
# ============================================================================

name: Benchmark Dashboard

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      deployments: write

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake ccache

    - name: Cache ccache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.cache/ccache
        key: ccache-bench-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'include/**') }}
        restore-keys: |
          ccache-bench-

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=200M
        ccache --set-config=compression=true
        ccache -z

    - name: Clone libsecp256k1 (for apple-to-apple comparison)
      run: |
        git clone --depth 1 https://github.com/bitcoin-core/secp256k1.git \
          "$GITHUB_WORKSPACE/_libsecp256k1"

    - name: Configure (Release)
      run: |
        cmake -S . -B build/bench \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DSECP256K1_MARCH=x86-64-v3 \
          -DBUILD_TESTING=ON \
          -DSECP256K1_USE_ASM=ON \
          -DLIBSECP_SRC_DIR="$GITHUB_WORKSPACE/_libsecp256k1/src"

    - name: Build
      run: cmake --build build/bench -j$(nproc)

    - name: Run benchmark suite
      run: |
        mkdir -p benchmark_results
        
        # Run unified benchmark and capture output
        ./build/bench/cpu/bench_unified 2>&1 | tee benchmark_results/raw_output.txt
        
        # Parse output into benchmark.js-compatible JSON
        python3 .github/scripts/parse_benchmark.py \
          benchmark_results/raw_output.txt \
          benchmark_results/benchmark.json

    - name: Store benchmark result
      if: github.event_name == 'push'
      uses: benchmark-action/github-action-benchmark@4bdcce38c94cec68da58d012ac24b7b1155efe8b # v1
      with:
        name: 'UltrafastSecp256k1 Performance'
        tool: 'customSmallerIsBetter'
        output-file-path: benchmark_results/benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        alert-threshold: '150%'
        comment-on-alert: true
        fail-on-alert: false
        # v2: baseline reset after DoNotOptimize harness migration
        # (old baseline had 0ns for optimized-away operations)
        benchmark-data-dir-path: 'dev/bench-v2'

    - name: Summary
      run: |
        echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat benchmark_results/raw_output.txt | head -60 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

  benchmark-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
        submodules: recursive

    - name: Clone libsecp256k1 (for apple-to-apple comparison)
      run: |
        git clone --depth 1 https://github.com/bitcoin-core/secp256k1.git "$env:GITHUB_WORKSPACE\_libsecp256k1"

    - name: Configure (Release, MSVC)
      run: |
        cmake -S . -B build/bench -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DLIBSECP_SRC_DIR="$env:GITHUB_WORKSPACE\_libsecp256k1\src"

    - name: Build
      run: cmake --build build/bench --config Release -j $env:NUMBER_OF_PROCESSORS

    - name: Run benchmark suite
      run: |
        New-Item -Path benchmark_results -ItemType Directory -Force
        & .\build\bench\cpu\Release\bench_unified.exe 2>&1 | Tee-Object -FilePath benchmark_results\raw_output.txt

    - name: Summary
      run: |
        echo "## Windows Benchmark Results" >> $env:GITHUB_STEP_SUMMARY
        echo '```' >> $env:GITHUB_STEP_SUMMARY
        Get-Content benchmark_results\raw_output.txt | Select-Object -First 60 >> $env:GITHUB_STEP_SUMMARY
        echo '```' >> $env:GITHUB_STEP_SUMMARY
