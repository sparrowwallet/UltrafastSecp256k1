name: Security Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Weekly Monday 06:00 UTC — catch new CVEs
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Static Analysis: compiler warnings as errors ────────────────────────
  compiler-warnings:
    name: Build with -Werror
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends g++-13 ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-sa-werror-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-sa-werror-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=200M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DSECP256K1_WERROR=ON \
            -DSECP256K1_BUILD_TESTS=ON

      - name: Build (zero warnings required)
        run: cmake --build build -j"$(nproc)"

  # ── Address + Undefined Behavior Sanitizers ─────────────────────────────
  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-17 lld-17 ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-sa-asan-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-sa-asan-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=200M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure with sanitizers
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DSECP256K1_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        # Sanitizers add 3-15x overhead; raise per-test timeout and exclude
        # selftest/unified_audit (standalone tests cover the same modules).
        run: ctest --test-dir build --output-on-failure -j"$(nproc)" -E "^(ct_sidechannel|selftest|unified_audit)" --timeout 900

  # ── Memory Sanitizer (uninitialized reads) ──────────────────────────────
  msan:
    name: MSan
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang-17 lld-17 ninja-build ccache libc++-17-dev libc++abi-17-dev

      - name: Cache MSan-instrumented libc++
        id: msan-libcxx-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/msan-libcxx
          key: msan-libcxx-clang17-v3

      - name: Build MSan-instrumented libc++
        if: steps.msan-libcxx-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch llvmorg-17.0.6 \
            https://github.com/llvm/llvm-project.git /tmp/llvm-project
          cmake -G Ninja -S /tmp/llvm-project/runtimes -B /tmp/msan-libcxx-build \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_USE_SANITIZER=MemoryWithOrigins \
            -DLIBCXX_ENABLE_EXPERIMENTAL_LIBRARY=OFF
          cmake --build /tmp/msan-libcxx-build -j"$(nproc)" -- cxx cxxabi
          # Install to a persistent path for caching.
          # LLVM 17 runtimes build ignores LIBCXX_ENABLE_EXPERIMENTAL_LIBRARY=OFF
          # in the install manifest, so the install fails trying to copy the
          # unbuilt libc++experimental.a.  Tolerate that error and verify the
          # libraries we actually need are present.
          DESTDIR=/tmp/msan-libcxx cmake --install /tmp/msan-libcxx-build --prefix /usr || true
          test -f /tmp/msan-libcxx/usr/lib/libc++.a
          test -f /tmp/msan-libcxx/usr/lib/libc++abi.a
          rm -rf /tmp/llvm-project /tmp/msan-libcxx-build

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-sa-msan-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-sa-msan-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=200M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure with MSan
        env:
          MSAN_LIBCXX: /tmp/msan-libcxx/usr
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DCMAKE_CXX_FLAGS="-fsanitize=memory -fno-omit-frame-pointer -fsanitize-memory-track-origins=2 -stdlib=libc++ -nostdinc++ -isystem ${MSAN_LIBCXX}/include/c++/v1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=memory -stdlib=libc++ -L${MSAN_LIBCXX}/lib -lc++abi -Wl,-rpath,${MSAN_LIBCXX}/lib" \
            -DSECP256K1_USE_ASM=OFF \
            -DSECP256K1_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test under MSan
        env:
          MSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          # MSan + no-ASM + Debug + origin-tracking is slow (~10-20x overhead).
          # Exclude known-slow tests; generous timeout for the rest.
          # halt_on_error=1 ensures MSan violations produce non-zero exit.
          # No '|| true' -- this is a hard gate: any MSan error fails the job.
          #
          # Heavy audit tests are excluded because they exceed their CTest
          # timeouts under MSan overhead (~10-20x). These tests are verified
          # under ASan+UBSan and Valgrind instead.
          ctest --test-dir build --output-on-failure -j"$(nproc)" \
            -E "^(ct_sidechannel|selftest|unified_audit|differential|fault_injection|fiat_crypto_vectors|debug_invariants|carry_propagation|batch_randomness|wycheproof_ecdsa|wycheproof_ecdh|cross_platform_kat|audit_fuzz|ct_verif_formal|ecies_regression|adversarial_protocol)" --timeout 7200

  # ── Thread Sanitizer (data races) ───────────────────────────────────────
  tsan:
    name: TSan
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-17 lld-17 ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-sa-tsan-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-sa-tsan-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=200M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure with TSan
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-17 \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DSECP256K1_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test under TSan
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: ctest --test-dir build --output-on-failure -j"$(nproc)" -E "^(ct_sidechannel|selftest|unified_audit)" --timeout 900

  # ── Valgrind memcheck ───────────────────────────────────────────────────
  valgrind:
    name: Valgrind Memcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends g++-13 ninja-build valgrind ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-sa-valgrind-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-sa-valgrind-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=200M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DSECP256K1_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run tests under Valgrind
        run: |
          ctest --test-dir build --output-on-failure -j"$(nproc)" \
            -E "^ct_sidechannel" \
            --overwrite MemoryCheckCommand=/usr/bin/valgrind \
            --overwrite "MemoryCheckCommandOptions=--leak-check=full --error-exitcode=1 --show-leak-kinds=definite,indirect,possible --errors-for-leak-kinds=definite,indirect,possible --suppressions=${{ github.workspace }}/valgrind.supp" \
            -T MemCheck || true
          # Valgrind runs are slow (10-20x overhead); some audit tests may
          # exceed their CTest timeout.  We tolerate timeout exits and only
          # fail on real memory errors detected in the Valgrind logs below.
          # Check for real errors in memcheck output
          if grep -q 'ERROR SUMMARY: [1-9]' build/Testing/Temporary/MemoryChecker.*.log 2>/dev/null; then
            echo "::error::Valgrind found memory errors"
            cat build/Testing/Temporary/MemoryChecker.*.log
            exit 1
          fi
          # Also check for definite leaks
          if grep -q 'definitely lost: [1-9]' build/Testing/Temporary/MemoryChecker.*.log 2>/dev/null; then
            echo "::error::Valgrind found definite memory leaks"
            cat build/Testing/Temporary/MemoryChecker.*.log
            exit 1
          fi

  # ── Constant-time side-channel (dudect) smoke test ──────────────────────
  dudect:
    name: dudect Timing Analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends g++-13 ninja-build ccache

      - name: Cache ccache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ccache
          key: ccache-sa-dudect-${{ hashFiles('cpu/src/**', 'cpu/include/**', 'include/**') }}
          restore-keys: |
            ccache-sa-dudect-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=200M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DSECP256K1_MARCH=x86-64-v3 \
            -DSECP256K1_BUILD_TESTS=ON

      - name: Build dudect test
        run: cmake --build build --target test_ct_sidechannel_standalone -j"$(nproc)"

      - name: Run dudect timing analysis (5 min timeout)
        run: |
          EXIT=0
          timeout 300 ./build/cpu/test_ct_sidechannel_standalone 2>&1 | tee dudect_smoke.log || EXIT=$?
          if [ "$EXIT" -eq 124 ]; then
            echo "dudect reached timeout limit (expected for CI smoke run -- advisory only)"
          elif [ "$EXIT" -ne 0 ]; then
            echo "::warning::dudect reported timing variance (common on shared CI runners -- verify locally)"
            echo "dudect exit code: $EXIT (advisory -- not blocking CI)"
          else
            echo "dudect: PASS (no timing leakage detected)"
          fi
          # dudect is statistical and unreliable on shared CI runners.
          # This is intentionally advisory. Deterministic CT checks (ct-verif,
          # valgrind-ct) are the blocking gates.
          exit 0

      - name: Upload dudect results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dudect-smoke-results
          path: dudect_smoke.log
          retention-days: 90